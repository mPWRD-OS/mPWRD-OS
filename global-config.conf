# Global settings
# See https://docs.armbian.com/Developer-Guide_Build-Switches/

# Whitelabeling
VENDOR="mPWRD-OS"
VENDORURL="https://github.com/mPWRD-OS/mPWRD-userpatches/"
# VENDORSUPPORT="https://your-support-url.com/"
# VENDORPRIVACY="https://your-privacy-url.com/"
VENDORBUGS="https://github.com/mPWRD-OS/mPWRD-userpatches/issues"
VENDORDOCS="https://github.com/mPWRD-OS/mPWRD-userpatches/wiki"
# VENDORLOGO="armbian-logo"
# VENDORCOLOR="247;16;0"

# Release settings
RELEASE=trixie
DOCKER_ARMBIAN_BASE_IMAGE="ubuntu:noble"
INSTALL_HEADERS=yes
INSTALL_ARMBIAN_FIRMWARE=yes
BUILD_DESKTOP=no
BUILD_MINIMAL=yes
DEB_COMPRESS=xz
# NetworkManager / nmcli is more user-friendly.
NETWORKING_STACK="network-manager"
EXTRAWIFI=yes
COMPRESS_OUTPUTIMAGE="xz,sha"
