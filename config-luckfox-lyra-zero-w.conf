# Global settings
source global-config.conf
source family-rk3506.conf

# Board-specific
BOARD=luckfox-lyra-zero-w
ENABLE_EXTENSIONS="unblock-rfkill"

# Enable the minimal kernel pieces needed for the Raspberry Pi Display 2
# panel, its ATTINY backlight regulator, and the GT911 touch controller.
function custom_kernel_config__lyra_zero_rpi_display2() {
	opts_y+=(
		FB
		FRAMEBUFFER_CONSOLE
		FRAMEBUFFER_CONSOLE_ROTATION
		FONT_8x16
		DRM_FBDEV_EMULATION
		TOUCHSCREEN_GOODIX
		REGULATOR_RASPBERRYPI_TOUCHSCREEN_ATTINY
		VT
		VT_CONSOLE
	)

	opts_m+=(
		DRM_PANEL_ILITEK_ILI9881C
		DRM_PANEL_SIMPLE
		REGULATOR_RASPBERRYPI_TOUCHSCREEN_V2
	)
}
