# Global settings
source global-config.conf
source family-rk3506.conf

# Board-specific
BOARD=luckfox-lyra-zero-w
ENABLE_EXTENSIONS="$ENABLE_EXTENSIONS,unblock-rfkill,armbian-web-config"

# Disable UART interrupts during boot
# preventing UART-enabled hats from interfering with uboot.
function post_family_config__override_bootdelay() {
	declare -g BOOTDELAY="-2"
}

# Enable the combined display and console-keyboard support needed on Lyra Zero W.
function custom_kernel_config__lyra_zero_displays_console_keyboard() {
	opts_y+=(
		FB
		FRAMEBUFFER_CONSOLE
		FRAMEBUFFER_CONSOLE_ROTATION
		FONT_8x16
		DRM_FBDEV_EMULATION
		MD
		BLK_DEV_DM
		DM_CRYPT
		CRYPTO_XTS
		TOUCHSCREEN_GOODIX
		REGULATOR_RASPBERRYPI_TOUCHSCREEN_ATTINY
		VT
		VT_CONSOLE
	)

	opts_m+=(
		DRM_PANEL_ILITEK_ILI9881C
		DRM_PANEL_OSOYOO_DSI
		DRM_PANEL_SIMPLE
		INPUT_UINPUT
		REGULATOR_RASPBERRYPI_TOUCHSCREEN_V2
	)
}
